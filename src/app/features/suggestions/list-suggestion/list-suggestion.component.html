<!-- suggestions-list.component.html -->
  <!-- Main Content -->
  <div class="container">
    <h2 class="page-title">Liste des suggestions</h2>

    <!-- Search Bar -->
    <div class="search-wrapper">
      <input
        type="text"
        class="search-input"
        placeholder="Rechercher une suggestion..."
        [(ngModel)]="searchQuery"
        (input)="onSearch()"
      />
      <span class="search-icon">🔍</span>
    </div>

    <!-- Suggestions List -->
    <div class="suggestions-list">
      <div
        class="suggestion-card"
        *ngFor="let suggestion of filteredSuggestions"
        (click)="viewDetail(suggestion)" style="cursor:pointer"
      >
        <div class="card-header">
          <h3 class="card-title">{{ suggestion.title }}</h3>
          <div class="card-meta">
            <span class="category-badge" [ngClass]="getCategoryClass(suggestion.category)">
              {{ suggestion.category }}
            </span>
            <span class="card-date">{{ suggestion.date.toLocaleDateString() }}</span>
          </div>
        </div>

        <p class="card-description">{{ suggestion.description }}</p>

        <div class="card-footer">
          <span
            class="status-badge"
            [ngClass]="getStatusClass(suggestion.status)"
          >
            {{ suggestion.status }}
          </span>
        </div>
      </div>

      <!-- Empty state -->
      <div class="empty-state" *ngIf="filteredSuggestions.length === 0">
        <p>Aucune suggestion trouvée.</p>
      </div>
    </div>
  </div>
