<!-- suggestions-list.component.html -->
<div class="page-wrapper">

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">Campus Ideas</div>
    <div class="navbar-links">
      <a class="nav-link" routerLink="/accueil">Accueil</a>
      <a class="nav-link active" routerLink="/suggestions">Suggestions</a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <h2 class="page-title">Liste des suggestions</h2>

    <!-- Search Bar -->
    <div class="search-wrapper">
      <input
        type="text"
        class="search-input"
        placeholder="Rechercher une suggestion..."
        [(ngModel)]="searchQuery"
        (input)="onSearch()"
      />
      <span class="search-icon">🔍</span>
    </div>

    <!-- Suggestions List -->
    <div class="suggestions-list">
      <div
        class="suggestion-card"
        *ngFor="let suggestion of filteredSuggestions"
      >
        <div class="card-header">
          <h3 class="card-title">{{ suggestion.title }}</h3>
          <div class="card-meta">
            <span class="category-badge" [ngClass]="getCategoryClass(suggestion.category)">
              {{ suggestion.category }}
            </span>
            <span class="card-date">{{ suggestion.date }}</span>
          </div>
        </div>

        <p class="card-description">{{ suggestion.description }}</p>

        <div class="card-footer">
          <span
            class="status-badge"
            [ngClass]="getStatusClass(suggestion.status)"
          >
            {{ suggestion.status }}
          </span>

          <!-- Like & Favoris buttons — hidden if status is REFUSÉE -->
          <div class="card-actions" *ngIf="suggestion.status !== 'REFUSÉE'">
            <button
              class="btn btn-like"
              (click)="likesuggestion(suggestion)"
            >
              👍 Like {{ suggestion.nbLikes }}
            </button>
            <button
              class="btn btn-favoris"
              [class.favorited]="suggestion.isFavorite"
              (click)="addToFavoris(suggestion)"
            >
              <span>{{ suggestion.isFavorite ? '❤️' : '🤍' }}</span>
              {{ suggestion.isFavorite ? 'Ajouté aux favoris' : 'Ajouter aux favoris' }}
            </button>
          </div>
        </div>
      </div>

      <!-- Empty state -->
      <div class="empty-state" *ngIf="filteredSuggestions.length === 0">
        <p>Aucune suggestion trouvée.</p>
      </div>
    </div>
  </div>
</div>
